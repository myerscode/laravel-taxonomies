name: Security Audit

on:
  schedule:
    - cron: "0 6 * * *"
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
      - name: Install dependencies
        run: composer install --prefer-dist --no-progress --no-interaction
      - name: Run security audit
        run: composer audit
